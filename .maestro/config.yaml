# Maestro E2E Test Configuration for Close Your Tab
# https://maestro.mobile.dev/

# App configuration
appId: com.peacockerystudio.closeyourtab
name: Close Your Tab E2E Tests

# Default settings
env:
  APP_ID: com.peacockerystudio.closeyourtab

# Test execution settings
# Increase timeout for slower operations
executionOrder:
  continueOnFailure: false

# Tags for organizing tests
tags:
  smoke: Quick sanity checks
  tab-flow: Tab opening and closing flows
  ui: UI consistency checks
  navigation: Navigation between screens
